<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شاهين إكسبريس | النسخة الكاملة الآلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg: #1a051a; --glass: rgba(30, 10, 30, 0.95); --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        .royal-bg-shadow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 320px; background: url('https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg') no-repeat center/contain; opacity: 0.1; pointer-events: none; z-index: 0; }
        #apple-notify { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 20px; z-index: 10000; text-align: center; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #apple-notify.show { top: 20px; }
        #eagle-takeoff { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .eagle-animate { color: var(--gold); font-size: 80px; animation: eagleFly 2s ease-in-out forwards; }
        @keyframes eagleFly { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: translateY(-100vh) scale(1.5); opacity: 0; } }
        .app-shell { width: 100%; max-width: 500px; height: 100%; margin: auto; position: relative; display: flex; flex-direction: column; border-left: 1px solid rgba(212,175,55,0.1); border-right: 1px solid rgba(212,175,55,0.1); }
        .page { display: none; padding: 0 25px 25px; flex-direction: column; flex-grow: 1; overflow-y: auto; z-index: 20; }
        .page.active { display: flex; animation: appleFade 0.5s ease; }
        @keyframes appleFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }
        .card { background: var(--glass); border-radius: 25px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .card img { width: 65px; height: 65px; border-radius: 16px; object-fit: cover; margin-left: 18px; border: 1px solid var(--gold); }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        .tab-bar { height: 90px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(212,175,55,0.1); }
        .tab-item { color: #555; text-align: center; cursor: pointer; font-size: 12px; }
        .tab-item.active { color: var(--gold); }
        .tab-item i { font-size: 20px; display: block; margin-bottom: 5px; }
        .loader { width: 20px; height: 20px; border: 3px solid var(--gold); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="royal-bg-shadow"></div>
<div id="apple-notify"><i class="fas fa-bell"></i> <span id="notify-msg"></span></div>

<div id="eagle-takeoff"><div class="eagle-animate"><i class="fas fa-dove"></i></div><h2 style="color:var(--gold)">طلبك انطلق مع الصقور...</h2></div>

<div class="app-shell">
    <div id="p-login" class="page active" style="justify-content:center; text-align:center;">
        <img src="https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg" width="120" style="border-radius:30px; margin-bottom:20px; border:2px solid var(--gold);">
        <div id="login-fields">
            <h2>صقور شاهين 🦅</h2>
            <input type="text" id="uName" style="width:100%; padding:18px; background:#000; border:1px solid #333; border-radius:15px; color:#fff; text-align:center; margin-bottom:10px;" placeholder="الاسم الكامل">
            <input type="tel" id="uPhone" style="width:100%; padding:18px; background:#000; border:1px solid #333; border-radius:15px; color:#fff; text-align:center; margin-bottom:15px;" placeholder="رقم الجوال (09xx / 05xx)">
            <button class="btn-gold" onclick="startAutoVerify()">دخول تلقائي عبر التيليجرام</button>
        </div>
        <div id="verify-wait" style="display:none">
            <h2 style="color:var(--gold)" class="pulse">بانتظار تفعيل البوت...</h2>
            <p>افتح البوت واضغط Start فقط</p>
            <button class="btn-gold" style="background:#2481cc; color:#fff; margin-bottom:20px;" onclick="window.open('https://t.me/ShaheenExpressBot', '_blank')">افتح البوت الآن</button>
            <div class="loader"></div>
        </div>
        <div id="verify-code" style="display:none">
            <h2>أدخل الكود المستلم</h2>
            <input type="number" id="vInput" style="width:100%; padding:18px; background:#000; border:1px solid var(--gold); border-radius:15px; color:#fff; text-align:center; margin-bottom:15px;" placeholder="0 0 0 0">
            <button class="btn-gold" onclick="finalVerify()">تأكيد الدخول ✅</button>
        </div>
    </div>

    <div id="apple-ui" style="display:none">
        <div style="padding:45px 25px 15px; text-align:right;"><h1>اكتشف</h1></div>
        <div style="padding:0 25px 20px;"><div style="background:rgba(255,255,255,0.06); border-radius:16px; padding:14px; display:flex; align-items:center; gap:10px; border:1px solid rgba(212,175,55,0.25);"><i class="fas fa-search" style="color:#555"></i><input type="text" id="g-search" style="background:none; border:none; color:#fff; width:100%; outline:none;" placeholder="ابحث عن مطعم أو صيدلية..." onkeyup="renderPlaces()"></div></div>
    </div>

    <div id="p-home" class="page"><div id="res-list"></div></div>
    
    <div id="p-menu" class="page">
        <div style="display:flex; align-items:center; gap:12px; margin: 25px 0;"><i class="fas fa-chevron-right" onclick="nav('p-home')" style="color:var(--gold); font-size:26px; cursor:pointer;"></i><h2 id="menu-title" style="margin:0;"></h2></div>
        <div id="items-list"></div>
    </div>

    <div id="p-cart" class="page">
        <div style="padding:40px 0 20px;"><h1>السلة</h1></div>
        <div id="cart-items"></div>
        <div id="cart-summary"></div>
    </div>

    <div id="p-history" class="page">
        <div style="padding:40px 0 20px;"><h1>طلباتي 🦅</h1></div>
        <div id="history-content"></div>
    </div>

    <div id="tab-bar" class="tab-bar" style="display:none">
        <div class="tab-item active" onclick="nav('p-home')"><i class="fas fa-compass"></i>اكتشف</div>
        <div class="tab-item" onclick="nav('p-cart')"><i class="fas fa-shopping-basket"></i>السلة</div>
        <div class="tab-item" onclick="nav('p-history')"><i class="fas fa-receipt"></i>طلباتي</div>
        <div class="tab-item" onclick="logout()" style="color:#e74c3c"><i class="fas fa-power-off"></i>خروج</div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8789071536:AAFLDY5VoMbeDsVhv3kvmzQ1DwRxmRirwsA";
    let user = null, cart = [], currentResId = null, generatedOTP = null, pollInterval = null;

    function notify(msg) {
        document.getElementById('notify-msg').innerText = msg;
        const n = document.getElementById('apple-notify');
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 4000);
    }

    // --- نظام التحقق الآلي ---
    function startAutoVerify() {
        const n = document.getElementById('uName').value;
        const p = document.getElementById('uPhone').value;
        if(n && (p.startsWith('09') || p.startsWith('05'))) {
            user = { name: n, phone: p };
            generatedOTP = Math.floor(1000 + Math.random() * 8999).toString();
            document.getElementById('login-fields').style.display = 'none';
            document.getElementById('verify-wait').style.display = 'block';
            window.open('https://t.me/ShaheenExpressBot', '_blank');
            
            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1`);
                    const data = await res.json();
                    if (data.result.length > 0 && data.result[0].message.text === "/start") {
                        clearInterval(pollInterval);
                        sendOTP(data.result[0].message.chat.id);
                    }
                } catch(e) {}
            }, 2000);
        } else { notify("أدخل اسمك ورقم سوري أو سعودي صحيح"); }
    }

    async function sendOTP(chatId) {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: `مرحباً ${user.name} 🦅\nكود التحقق هو: ${generatedOTP}` })
        });
        document.getElementById('verify-wait').style.display = 'none';
        document.getElementById('verify-code').style.display = 'block';
        notify("شيك على التيليجرام وصلك الكود!");
    }

    function finalVerify() {
        if(document.getElementById('vInput').value === generatedOTP) {
            localStorage.setItem('sh_user', JSON.stringify(user));
            location.reload();
        } else { notify("الكود غلط يا صقر!"); }
    }

    // --- نظام المطاعم ---
    function renderPlaces() {
        const query = document.getElementById('g-search').value.toLowerCase();
        const res = JSON.parse(localStorage.getItem('sh_res'));
        const filtered = res.filter(r => r.name.toLowerCase().includes(query));
        document.getElementById('res-list').innerHTML = filtered.map(r => `
            <div class="card" onclick="openMenu(${r.id})">
                <img src="${r.image}">
                <div style="flex:1;"><b>${r.name}</b><br><small style="color:var(--gold)">${r.cat}</small></div>
                <i class="fas fa-chevron-left" style="opacity:0.3"></i>
            </div>
        `).join('');
    }

    function openMenu(id) {
        const res = JSON.parse(localStorage.getItem('sh_res')).find(r => r.id == id);
        document.getElementById('menu-title').innerText = res.name;
        document.getElementById('items-list').innerHTML = res.menu.map(m => `
            <div class="card">
                <div style="flex:1;"><b>${m.name}</b><br><small>${m.price.toLocaleString()} ل.س</small></div>
                <button class="btn-gold" style="width:auto; padding:8px 15px;" onclick="addToCart('${res.id}','${res.name}','${m.name}',${m.price})">أضف</button>
            </div>
        `).join('');
        nav('p-menu');
    }

    function addToCart(rid, rname, name, price) {
        if(currentResId && currentResId !== rid) { notify("لا يمكن الطلب من مكانين مختلفين!"); return; }
        currentResId = rid;
        const item = cart.find(i => i.name === name);
        if(item) item.qty++; else cart.push({rname, name, price, qty:1});
        notify("تمت الإضافة للسلة ✅");
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        if(cart.length === 0) { container.innerHTML = "<p style='text-align:center; opacity:0.5;'>سلتك فارغة</p>"; document.getElementById('cart-summary').innerHTML = ""; return; }
        container.innerHTML = cart.map((i,idx) => `
            <div class="card">
                <div style="flex:1;"><b>${i.name}</b><br><small>${(i.price * i.qty).toLocaleString()} ل.س</small></div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <i class="fas fa-minus-circle" onclick="changeQty(${idx},-1)"></i>
                    <b>${i.qty}</b>
                    <i class="fas fa-plus-circle" onclick="changeQty(${idx},1)"></i>
                </div>
            </div>
        `).join('');
        const total = cart.reduce((s,i) => s + (i.price*i.qty), 0) + 10000;
        document.getElementById('cart-summary').innerHTML = `
            <div class="card" style="flex-direction:column; align-items:stretch;">
                <div style="display:flex; justify-content:space-between;"><span>التوصيل:</span><span>10,000 ل.س</span></div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:bold; color:var(--gold);"><span>الإجمالي:</span><span>${total.toLocaleString()} ل.س</span></div>
            </div>
            <button class="btn-gold" onclick="checkout()">تأكيد الطلب 🦅</button>
        `;
    }

    function changeQty(idx, d) {
        cart[idx].qty += d;
        if(cart[idx].qty <= 0) cart.splice(idx,1);
        if(cart.length === 0) currentResId = null;
        renderCart();
    }

    function checkout() {
        document.getElementById('eagle-takeoff').style.display = 'flex';
        const order = { id: Date.now(), res: cart[0].rname, total: cart.reduce((s,i)=>s+(i.price*i.qty),0)+10000, status: 'قيد التنفيذ 🦅' };
        let history = JSON.parse(localStorage.getItem('sh_orders')) || [];
        history.unshift(order);
        localStorage.setItem('sh_orders', JSON.stringify(history));
        setTimeout(() => { 
            cart = []; currentResId = null;
            document.getElementById('eagle-takeoff').style.display = 'none'; 
            nav('p-history'); 
        }, 2000);
    }

    function renderHistory() {
        const orders = JSON.parse(localStorage.getItem('sh_orders')) || [];
        document.getElementById('history-content').innerHTML = orders.map(o => `
            <div class="card">
                <div style="flex:1;"><b>${o.res}</b><br><small>${o.total.toLocaleString()} ل.س</small></div>
                <div style="color:var(--gold)">${o.status}</div>
            </div>
        `).join('');
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('apple-ui').style.display = (id === 'p-home') ? 'block' : 'none';
        document.querySelectorAll('.tab-item').forEach((t,i) => {
            t.classList.remove('active');
            if((id==='p-home'&&i===0)||(id==='p-cart'&&i===1)||(id==='p-history'&&i===2)) t.classList.add('active');
        });
        if(id==='p-home') renderPlaces(); if(id==='p-cart') renderCart(); if(id==='p-history') renderHistory();
    }

    function logout() { localStorage.removeItem('sh_user'); location.reload(); }

    window.onload = () => {
        if(!localStorage.getItem('sh_res')) {
            localStorage.setItem('sh_res', JSON.stringify([
                {id:1, name:"مطعم الملكي", cat:"مطعم", image:"https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg", menu:[{name:"وجبة شاهين", price:45000},{name:"شاورما دبل", price:25000}]},
                {id:2, name:"صيدلية الشفاء", cat:"صيدلية", image:"https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg", menu:[{name:"بندول", price:5000},{name:"فيتامين C", price:12000}]}
            ]));
        }
        if(localStorage.getItem('sh_user')) {
            document.getElementById('p-login').classList.remove('active');
            document.getElementById('apple-ui').style.display = 'block';
            document.getElementById('tab-bar').style.display = 'flex';
            nav('p-home');
        }
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شاهين إكسبريس | النسخة المستقرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg-purple: #1a051a; --glass: rgba(30, 10, 30, 0.95); --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg-purple); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        .royal-bg-shadow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 320px; background: url('https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg') no-repeat center/contain; opacity: 0.1; pointer-events: none; z-index: 0; }
        
        #apple-notify { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 20px; z-index: 10000; text-align: center; font-weight: bold; }
        #apple-notify.show { top: 20px; }

        #eagle-takeoff { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-purple); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; }
        .eagle-animate { color: var(--gold); font-size: 80px; animation: eagleFly 2.5s ease-in-out forwards; }
        @keyframes eagleFly { 0% { transform: scale(0.5) translateY(50px); opacity: 0; } 100% { transform: scale(1.5) translateY(-100vh); opacity: 0; } }

        .app-shell { width: 100%; max-width: 500px; height: 100%; margin: auto; position: relative; display: flex; flex-direction: column; border-left: 1px solid rgba(212,175,55,0.1); border-right: 1px solid rgba(212,175,55,0.1); }
        .page { display: none; padding: 0 25px 25px; flex-direction: column; flex-grow: 1; overflow-y: auto; z-index: 20; }
        .page.active { display: flex; animation: appleFade 0.5s ease; }
        @keyframes appleFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }

        .card { background: var(--glass); border-radius: 25px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: bold; cursor: pointer; }

        /* شاشة الدردشة */
        #p-chat { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-purple); z-index: 5000; display: none; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--gold); color: #000; }
        .msg.him { align-self: flex-start; background: rgba(255,255,255,0.1); color: #fff; }

        .tab-bar { height: 90px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(212,175,55,0.1); }
        .tab-item { color: #555; text-align: center; cursor: pointer; }
        .tab-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="royal-bg-shadow"></div>
<div id="apple-notify"><i class="fas fa-bell"></i> <span id="notify-msg"></span></div>

<div id="eagle-takeoff">
    <div class="eagle-animate"><i class="fas fa-dove"></i></div>
    <h2 style="color:var(--gold); margin-top:25px;">صقور شاهين انطلقت.. 🦅</h2>
</div>

<div id="p-chat">
    <div style="padding:25px; background:#000; border-bottom:1px solid var(--gold); display:flex; align-items:center; gap:15px;">
        <i class="fas fa-chevron-right" onclick="closeChat()" style="color:var(--gold); font-size:20px;"></i>
        <b id="chat-title">دردشة الصقر</b>
    </div>
    <div id="chat-msgs-list" class="chat-msgs"></div>
    <div style="padding:15px; background:#111; display:flex; gap:10px;">
        <input type="text" id="chat-input" style="flex:1; padding:15px; border-radius:15px; background:#222; border:none; color:#fff;" placeholder="رسالة للصقر...">
        <button onclick="sendUserMsg()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:15px;"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div class="app-shell">
    <div id="p-login" class="page active" style="justify-content:center; text-align:center;">
        <img src="https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg" width="120" style="border-radius:30px; margin-bottom:20px; border:2px solid var(--gold);">
        <input type="text" id="uName" style="width:100%; padding:20px; background:#1a1a1a; border-radius:18px; color:#fff; text-align:center; margin-bottom:15px; outline:none;" placeholder="الاسم الكامل">
        <input type="tel" id="uPhone" style="width:100%; padding:20px; background:#1a1a1a; border-radius:18px; color:#fff; text-align:center; margin-bottom:15px; outline:none;" placeholder="09xxxxxxxx">
        <button class="btn-gold" onclick="login()">دخول سريع</button>
    </div>

    <div id="p-home" class="page">
        <div style="padding:40px 0 20px; text-align:right;"><h1 style="color:var(--gold)">اكتشف</h1></div>
        <div id="res-list"></div>
    </div>

    <div id="p-history" class="page">
        <div style="padding:40px 0 20px; text-align:right;"><h1 style="color:var(--gold)">طلباتي 🦅</h1></div>
        <div id="history-content"></div>
    </div>

    <div id="tab-bar" class="tab-bar" style="display:none">
        <div class="tab-item active" onclick="nav('p-home')"><i class="fas fa-compass"></i><span>اكتشف</span></div>
        <div class="tab-item" onclick="nav('p-history')"><i class="fas fa-receipt"></i><span>طلباتي</span></div>
    </div>
</div>

<script>
    let currentOrderId = null;

    function notify(msg) {
        document.getElementById('notify-msg').innerText = msg;
        const n = document.getElementById('apple-notify');
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 3000);
    }

    function login() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
        if(n && /^09\d{8}$/.test(p)) {
            localStorage.setItem('sh_active_user', JSON.stringify({name:n, phone:p}));
            location.reload();
        } else { notify("⚠️ تأكد من الرقم"); }
    }

    window.onload = () => {
        if(localStorage.getItem('sh_active_user')) {
            document.getElementById('p-login').classList.remove('active');
            document.getElementById('tab-bar').style.display = 'flex';
            nav('p-home');
            renderPlaces();
        }
    };

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'p-history') renderHistory();
    }

    function renderPlaces() {
        const allRes = JSON.parse(localStorage.getItem('sh_restaurants')) || [];
        document.getElementById('res-list').innerHTML = allRes.map(r => `
            <div class="card" onclick="alert('جاري تجهيز المنيو...')">
                <div style="flex:1; text-align:right;"><b>${r.name}</b><br><small style="color:var(--gold)">اطلب الآن</small></div>
            </div>
        `).join('');
    }

    function renderHistory() {
        const all = JSON.parse(localStorage.getItem('sh_my_orders')) || [];
        document.getElementById('history-content').innerHTML = all.map(o => {
            // التحقق من حالة الطلب لقفل الدردشة
            const isDelivered = o.status.includes("تم التسليم") || o.status.includes("مكتمل");
            return `
            <div class="card" style="border-right:4px solid var(--gold); display:block; text-align:right;">
                <div style="display:flex; justify-content:space-between;">
                    <b>${o.res}</b><span>${o.total} ل.س</span>
                </div>
                <p style="font-size:12px; margin:10px 0; color:#aaa;">${o.items}</p>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    ${!isDelivered ? `<button class="btn-gold" style="padding:8px 15px; font-size:12px;" onclick="openChat('${o.id}')">تواصل مع الصقر <i class="fas fa-comment"></i></button>` : `<span style="color:#555; font-size:12px;">انتهت المهمة ✅</span>`}
                    <span style="color:var(--gold); font-size:12px;">${o.status}</span>
                </div>
            </div>`;
        }).join('');
    }

    function openChat(orderId) {
        currentOrderId = orderId;
        document.getElementById('p-chat').style.display = 'flex';
        renderMsgs();
        window.chatTimer = setInterval(renderMsgs, 2000);
    }

    function closeChat() {
        document.getElementById('p-chat').style.display = 'none';
        clearInterval(window.chatTimer);
    }

    function sendUserMsg() {
        const txt = document.getElementById('chat-input').value;
        if(!txt) return;
        let chats = JSON.parse(localStorage.getItem('sh_chats')) || [];
        chats.push({ orderId: currentOrderId, sender: 'user', text: txt });
        localStorage.setItem('sh_chats', JSON.stringify(chats));
        document.getElementById('chat-input').value = "";
        renderMsgs();
    }

    function renderMsgs() {
        // ميزة القفل التلقائي: إذا تم تسليم الطلب وأنت داخل الشات، يتم إغلاقه فوراً
        const allOrders = JSON.parse(localStorage.getItem('sh_active_orders')) || [];
        const currentOrder = allOrders.find(o => o.id == currentOrderId);
        if(!currentOrder && currentOrderId) { closeChat(); return; }

        const chats = JSON.parse(localStorage.getItem('sh_chats')) || [];
        const filtered = chats.filter(c => c.orderId == currentOrderId);
        const container = document.getElementById('chat-msgs-list');
        container.innerHTML = filtered.map(c => `<div class="msg ${c.sender === 'user' ? 'me' : 'him'}">${c.text}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
